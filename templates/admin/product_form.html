{% extends 'base.html' %}
{% block content %}
<h2>{% if product %}Edit{% else %}New{% endif %} Product</h2>
<form method="post" class="form">
	<label>
		<span>Name</span>
		<input type="text" name="name" value="{{ product.name if product else '' }}" required>
	</label>
	<label>
		<span>Description</span>
		<textarea name="description">{{ product.description if product else '' }}</textarea>
	</label>
	<label>
		<span>Category</span>
		<input type="text" name="category" value="{{ product.category if product else 'General' }}">
	</label>
	<label>
		<span>Price</span>
		<input type="number" step="0.01" min="0" name="price" value="{{ product.price if product else 0 }}" required>
	</label>
	<label>
		<span>Stock</span>
		<input type="number" min="0" name="stock" value="{{ product.stock if product else 0 }}" required>
	</label>
	<button type="submit">Save</button>
	<a class="button" href="{{ url_for('admin_products') }}">Cancel</a>
</form>
{% endblock %}
